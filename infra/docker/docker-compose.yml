version: "3.9"
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: greenlab
      POSTGRES_PASSWORD: greenlab
      POSTGRES_DB: greenlab
    ports:
      - "5432:5432"
    volumes:
      - greenlab_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  greenlab_pgdata:
